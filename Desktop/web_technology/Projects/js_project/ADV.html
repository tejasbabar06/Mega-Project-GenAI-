<!DOCTYPE html>
<html>
<head>
    <title>Latest Global News</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            min-height: 100vh;
            padding: 40px;
            color: #333;
        }

        h2 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 32px;
            letter-spacing: 1px;
        }

        form {
            background: white;
            max-width: 500px;
            margin: auto;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input[type="date"] {
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        button {
            padding: 10px;
            border: none;
            border-radius: 6px;
            background: #2a5298;
            color: white;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #1e3c72;
            transform: scale(1.05);
        }

        .error {
            color: red;
            font-size: 14px;
        }

        #loading {
            text-align: center;
            margin: 20px;
            font-weight: bold;
            color: white;
        }

        #newsContainer {
            max-width: 900px;
            margin: 30px auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .news {
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            transition: 0.3s;
        }

        .news:hover {
            transform: translateY(-5px);
        }

        .news h3 {
            font-size: 18px;
            margin-bottom: 10px;
            color: #1e3c72;
        }

        .news p {
            font-size: 14px;
            margin-bottom: 12px;
        }

        .news button {
            background: #ff6b6b;
            font-size: 13px;
        }

        .news button:hover {
            background: #ff3b3b;
        }
    </style>
</head>

<body>

<h2>🌍 See Latest Global News</h2>

<form id="newsForm">
    <label>Select Date:</label>
    <input type="date" id="dateInput" required>
    <button type="submit">Get News</button>
    <p id="error" class="error"></p>
</form>

<p id="loading"></p>

<div id="newsContainer"></div>

<script src="ADV.js"></script>

</body>
</html>
